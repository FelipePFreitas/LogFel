spring.datasource.url=${BD_CONEXAO:jdbc:mysql://localhost:3306/logfel?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.max-lifetime=1800000

# Configuracoes do Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Dialeto atualizado para versoes modernas do Spring Boot / Hibernate
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuracoes de Documentacao e Aplicacao
springdoc.override-with-generic-response=false
spring.application.name=LogFel
# Chave secreta para assinatura dos Tokens JWT (mude em produÁ„o)
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-super-ultra-secreta-123456}